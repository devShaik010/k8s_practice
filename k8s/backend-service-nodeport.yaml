apiVersion: v1
kind: Service
metadata:
  name: backend-service-nodeport    # Expose backend via NodePort (for direct testing)
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500               # Accessible at <NodeIP>:30500
